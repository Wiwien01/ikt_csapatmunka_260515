<!DOCTYPE html>
<html lang="hu">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SmartBudget</title>
<link rel="stylesheet" href="style.css">
</head>
<body>
<div class="container">
<header>
<h1>SmartBudget</h1>
</header>



<h3>Új tranzakció</h3>
<form id="form">
<div class="form-control">
<label for="text">Megnevezés</label>
<input type="text" id="text" placeholder="Pl. Fizetés, Kávé..." required>
</div>
<div class="form-control">
<label for="amount">Összeg (Ft)</label>
<input type="number" id="amount" placeholder="Összeg megadása..." required>
</div>
<div class="form-control">
<label for="type">Típus</label>
<select id="type">
<option value="income">Bevétel (+)</option>
<option value="expense">Kiadás (-)</option>
</select>
</div>
<button class="btn" type="submit">Hozzáadás</button>
</form>

<h3>Tranzakciók</h3>
<ul id="list" class="list"></ul>
</div>
<script src="app.js"></script>
</body>
</html>
